<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="styles/toDoList.css" />
  </head>
  <body>
    <div class="container">
      <div class="task-app">
        <h2>To-Do List <img src="images/icon.png" alt="todoicon" /></h2>
        <div class="row">
          <input type="text" id="input-box" placeholder="Enter your task" />
          <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="list-container">
          <!-- <li class="checked">task 1</li>
          <li>task 2</li>
          <li>task 3</li> -->
        </ul>
      </div>
    </div>
    <script src="script/toDoList.js"></script>
  </body>
</html>
